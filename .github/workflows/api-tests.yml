name: API Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ task_1_api ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install ruff allure-pytest

    - name: Run Ruff linter
      run: ruff check . --ignore=E701,F401,F811

    - name: Start services with Docker Compose
      run: |
        docker compose up -d

    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to be ready..."
        # Ждем оба сервиса
        timeout 180 bash -c 'until curl -f http://localhost:8000/docs 2>/dev/null; do sleep 5; done'
        timeout 180 bash -c 'until curl -f http://localhost:8001/docs 2>/dev/null; do sleep 5; done'

    - name: Run API tests
      run: |
        python -m pytest tests/ -v --alluredir=allure-results

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30
