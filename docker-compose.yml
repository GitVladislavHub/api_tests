services:
  test-service-1:
    image: python:3.12-slim
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install fastapi uvicorn &&
             echo 'from fastapi import FastAPI; app = FastAPI()' > app.py &&
             uvicorn app:app --host 0.0.0.0 --port 8000"

  test-service-2:
    image: python:3.12-slim
    ports:
      - "8001:8000"
    command: >
      sh -c "pip install fastapi uvicorn &&
             echo 'from fastapi import FastAPI; app = FastAPI()' > app.py &&
             uvicorn app:app --host 0.0.0.0 --port 8001"
