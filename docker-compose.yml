services:
  auth-service:
    image: python:3.12-slim
    ports:
      - "8000:8000"
    command: |
      sh -c "
      pip install fastapi uvicorn &&
      echo 'from fastapi import FastAPI
app = FastAPI()
@app.post(\"/auth/register/\")
def register(): return {\"message\":\"registered\"}
@app.post(\"/auth/login/\")
def login(): return {\"access_token\":\"mock\",\"token_type\":\"bearer\"}
@app.get(\"/docs\")
def docs(): return {\"status\":\"ok\"}' > app.py &&
      uvicorn app:app --host 0.0.0.0 --port 8000
      "

  university-service:
    image: python:3.12-slim
    ports:
      - "8001:8000"
    command: |
      sh -c "
      pip install fastapi uvicorn &&
      echo 'from fastapi import FastAPI, HTTPException
app = FastAPI()
@app.get(\"/grades/stats\")
def grades_stats(): raise HTTPException(401, \"Unauthorized\")
@app.get(\"/groups/\")
def get_groups(): raise HTTPException(401, \"Unauthorized\") 
@app.post(\"/groups/\")
def create_group(): raise HTTPException(401, \"Unauthorized\")
@app.get(\"/teachers/\")
def get_teachers(): raise HTTPException(401, \"Unauthorized\")
@app.post(\"/teachers/\")
def create_teacher(): raise HTTPException(401, \"Unauthorized\")
@app.get(\"/docs\")
def docs(): return {\"status\":\"ok\"}' > app.py &&
      uvicorn app:app --host 0.0.0.0 --port 8001
      "
